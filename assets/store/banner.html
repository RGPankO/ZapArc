<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1400px; height: 560px; overflow: hidden; }

.banner {
  width: 1400px;
  height: 560px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  position: relative;
  overflow: hidden;
}

/* Arc decorations */
.arc {
  position: absolute;
  border: 2px solid rgba(88, 86, 214, 0.12);
  border-radius: 50%;
}
.arc-1 { width: 500px; height: 500px; top: 50%; left: 30%; transform: translate(-50%, -50%); }
.arc-2 { width: 700px; height: 700px; top: 50%; left: 30%; transform: translate(-50%, -50%); border-color: rgba(88, 86, 214, 0.06); }
.arc-3 { width: 350px; height: 350px; top: 50%; left: 30%; transform: translate(-50%, -50%); border-color: rgba(88, 86, 214, 0.18); }

/* Glow effect */
.glow {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(0, 122, 255, 0.15) 0%, transparent 70%);
  top: 50%;
  left: 25%;
  transform: translate(-50%, -50%);
}

.content {
  display: flex;
  align-items: center;
  gap: 80px;
  position: relative;
  z-index: 1;
}

.left {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.icon-container {
  width: 140px;
  height: 140px;
  margin-bottom: 20px;
}
.icon-container img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.brand-name {
  font-size: 52px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 2px;
}
.brand-accent { color: #F7931A; }

.right {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 500px;
}

.tagline {
  font-size: 28px;
  color: rgba(255, 255, 255, 0.9);
  font-weight: 600;
  line-height: 1.3;
}

.features {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.feature {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 18px;
  color: rgba(255, 255, 255, 0.7);
}

.feature-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #F7931A;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="banner">
  <div class="arc arc-1"></div>
  <div class="arc arc-2"></div>
  <div class="arc arc-3"></div>
  <div class="glow"></div>
  
  <div class="content">
    <div class="left">
      <div class="icon-container">
        <img src="../icons/icon128.png" alt="ZapArc">
      </div>
      <div class="brand-name">Zap<span class="brand-accent">Arc</span></div>
    </div>
    <div class="right">
      <div class="tagline">Self Custody Lightning Wallet for Your Browser</div>
      <div class="features">
        <div class="feature"><span class="feature-dot"></span> Non-custodial — you control your keys</div>
        <div class="feature"><span class="feature-dot"></span> Instant Lightning Network payments</div>
        <div class="feature"><span class="feature-dot"></span> Works on any website</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
