<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 440px; height: 280px; overflow: hidden; }

.tile {
  width: 440px;
  height: 280px;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  position: relative;
  overflow: hidden;
}

/* Subtle arc decorations */
.tile::before {
  content: '';
  position: absolute;
  width: 300px;
  height: 300px;
  border: 2px solid rgba(88, 86, 214, 0.15);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.tile::after {
  content: '';
  position: absolute;
  width: 400px;
  height: 400px;
  border: 1.5px solid rgba(88, 86, 214, 0.08);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.icon-container {
  width: 80px;
  height: 80px;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}

.icon-container img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.brand-name {
  font-size: 28px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 1px;
  margin-bottom: 6px;
  position: relative;
  z-index: 1;
}

.brand-accent {
  color: #F7931A;
}

.tagline {
  font-size: 15px;
  color: rgba(255, 255, 255, 0.7);
  font-weight: 400;
  position: relative;
  z-index: 1;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.45);
  font-weight: 300;
  position: relative;
  z-index: 1;
}
</style>
</head>
<body>
<div class="tile">
  <div class="icon-container">
    <img src="../icons/icon128.png" alt="ZapArc">
  </div>
  <div class="brand-name">Zap<span class="brand-accent">Arc</span></div>
  <div class="tagline">Self Custody Lightning Wallet</div>
  <div class="subtitle">Your keys. Your coins.</div>
</div>
</body>
</html>
