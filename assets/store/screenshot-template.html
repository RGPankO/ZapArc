<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  width: 1280px; 
  height: 800px; 
  overflow: hidden;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

.frame {
  display: flex;
  align-items: center;
  gap: 60px;
}

.popup-frame {
  width: 350px;
  height: 500px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
  position: relative;
  background: linear-gradient(180deg, #1a1a2e, #16213e, #0f3460);
  background-attachment: fixed;
}

.popup-frame iframe {
  width: 350px;
  height: 500px;
  border: none;
}

.description {
  max-width: 400px;
}

.description h2 {
  font-size: 36px;
  color: #ffffff;
  margin-bottom: 16px;
  line-height: 1.2;
}

.description h2 .accent { color: #F7931A; }

.description p {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="frame">
  <div class="popup-frame" id="popup-container">
    <!-- Content will be injected -->
  </div>
  <div class="description">
    <h2 id="title">Welcome to <span class="accent">ZapArc</span></h2>
    <p id="desc">Self custody Lightning wallet right in your browser. Your keys, your coins.</p>
  </div>
</div>

<script>
// Load popup content directly
const container = document.getElementById('popup-container');
const params = new URLSearchParams(window.location.search);
const screen = params.get('screen') || 'welcome';
const title = params.get('title') || '';
const desc = params.get('desc') || '';

if (title) document.getElementById('title').innerHTML = title;
if (desc) document.getElementById('desc').textContent = desc;
</script>
</body>
</html>
