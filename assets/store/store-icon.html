<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZapArc Store Icon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 128px; height: 128px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(180deg, #1a1a2e, #16213e, #0f3460);
            border-radius: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        .logo {
            width: 64px; height: 64px;
            margin-bottom: 6px;
        }
        .logo img {
            width: 100%; height: 100%;
            object-fit: contain;
        }
        .text {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .text .zap { color: #FFFFFF; }
        .text .arc { color: #F7931A; }
    </style>
</head>
<body>
    <div class="logo"><img src="../icons/icon128.png" alt="ZapArc"></div>
    <div class="text"><span class="zap">Zap</span><span class="arc">Arc</span></div>
</body>
</html>
