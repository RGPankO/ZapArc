<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=800">
    <title>ZapArc - Deposit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0d0d2b 0%, #1a1a2e 30%, #16213e 60%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            gap: 80px; padding: 60px; overflow: hidden;
        }
        .popup-frame {
            width: 350px; height: 500px;
            background: linear-gradient(180deg, #1a1a2e, #16213e, #0f3460);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            flex-shrink: 0; display: flex; flex-direction: column;
            padding: 16px; overflow: hidden;
        }

        /* Header row: Back + Title */
        .deposit-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; padding: 6px 12px;
            color: #FFF; font-size: 13px; cursor: pointer;
        }
        .deposit-title {
            font-size: 18px; font-weight: 600; color: #FFF;
        }

        /* Main card */
        .deposit-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
        }
        .deposit-card p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-bottom: 14px;
        }

        /* Input */
        .amount-input {
            width: 100%;
            padding: 12px 14px;
            background: #16213e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            margin-bottom: 14px;
            outline: none;
        }

        /* Quick amounts */
        .quick-amounts {
            display: flex; gap: 8px;
            margin-bottom: 16px;
        }
        .quick-btn {
            flex: 1; padding: 8px 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #FFF; font-size: 13px; font-weight: 500;
            cursor: pointer; text-align: center;
        }

        /* Generate Invoice button (disabled state) */
        .generate-btn {
            width: 100%; padding: 12px;
            background: rgba(255,255,255,0.2);
            border: none; border-radius: 12px;
            color: rgba(255,255,255,0.4);
            font-size: 14px; font-weight: 500;
            cursor: not-allowed;
        }

        /* Marketing */
        .marketing { max-width: 400px; color: #FFF; }
        .marketing h1 { font-size: 42px; font-weight: 700; margin-bottom: 20px; line-height: 1.2; }
        .marketing h1 span { color: #F7931A; }
        .marketing p { font-size: 18px; color: rgba(255,255,255,0.7); line-height: 1.6; }
    </style>
</head>
<body>
    <div class="popup-frame">
        <div class="deposit-header">
            <button class="back-btn">← Back</button>
            <div class="deposit-title">Deposit Funds</div>
        </div>

        <div class="deposit-card">
            <p>Enter the amount you want to deposit:</p>
            <div class="amount-input">Amount in sats</div>
            <div class="quick-amounts">
                <div class="quick-btn">10K</div>
                <div class="quick-btn">50K</div>
                <div class="quick-btn">100K</div>
                <div class="quick-btn">500K</div>
            </div>
            <button class="generate-btn">Generate Invoice</button>
        </div>
    </div>

    <div class="marketing">
        <h1><span>Instant</span> Deposits</h1>
        <p>Generate a Lightning invoice in seconds. Share it with anyone and receive Bitcoin instantly with minimal fees.</p>
    </div>
</body>
</html>
